<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="js/access-guard.js"></script>
  <title>StudyBuddy - Choose Option</title>
  <style>
    :root {
      --bg: #f2f7ff;
      --panel: #ffffff;
      --line: #d7e3f3;
      --ink: #213042;
      --ink-soft: #5a6f86;
      --accent: #1e7fd6;
      --accent-2: #8ec5ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Nunito", system-ui, sans-serif;
      background: radial-gradient(circle at top right, #dbeeff 0%, var(--bg) 45%, #eef4ff 100%);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(680px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 14px 36px rgba(40, 65, 95, 0.14);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--ink-soft);
      font-size: 16px;
    }

    .actions {
      margin-top: 24px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .choice {
      display: block;
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px 18px;
      background: linear-gradient(180deg, #ffffff 0%, #f5faff 100%);
      color: var(--ink);
      font-weight: 700;
      transition: transform .15s ease, border-color .15s ease;
    }

    .choice small {
      display: block;
      margin-top: 6px;
      color: var(--ink-soft);
      font-weight: 500;
      line-height: 1.35;
    }

    .choice:hover,
    .choice:focus-visible {
      transform: translateY(-1px);
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent-2) 35%, transparent);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Choose Your Reading Option</h1>
    <p>Select one mode to open the StudyBuddy app.</p>

    <div class="actions">
      <a class="choice" href="option1.html">
        Option 1
        <small>Text 1 without built-in highlights, Text 2 with built-in highlights.</small>
      </a>
      <a class="choice" href="option2.html">
        Option 2
        <small>Text 1 with built-in highlights, Text 2 without built-in highlights.</small>
      </a>
    </div>
  </main>
</body>
</html>
