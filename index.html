<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyBuddy</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo" aria-hidden="true">
        <img src="Photos/sabiOwl.png" alt="" />
      </div>
      <div class="brand-name">StudyBuddy</div>
    </div>
    <nav class="nav">
      <a href="#features">Features</a>
      <a href="#how">How it works</a>
      <a href="#about">About Us</a>
    </nav>
  </header>

  <main class="layout">
    <button class="menu-btn" aria-label="Open menu">
      <img src="Icons/menu-burger.svg" alt="" />
    </button>

    <section class="panel left">
      <div class="panel-top">
        <div class="doc-icon" aria-hidden="true">
          <span></span>
          <span></span>
        </div>
        <div class="panel-title">
          <div class="title">REFORMATTED TEXT</div>
        </div>
        <button class="panel-mindmap" aria-label="Mind map" data-mindmap="true">
          <img src="Icons/mindmap.svg" alt="" />
        </button>
      </div>

      <div class="panel-body">
        <div class="left-controls">
          <div class="left-modes">
            <label class="left-control">
              <input type="radio" name="leftMode" value="larf" checked />
              LARF
            </label>
            <label class="left-control">
              <input type="radio" name="leftMode" value="original" />
              Original
            </label>
          </div>
          <label class="left-control">
            <input id="leftHighlights" type="checkbox" checked />
            activate highlights on the left part
          </label>
        </div>

        <div class="highlight-palette" id="highlightPalette" role="toolbar" aria-label="Highlight colors"></div>

        <div
          id="reformattedContent"
          class="reformatted-content"
          data-current-page="pageBook1"
          aria-label="Reformatted content"
        ></div>

        <div id="selectionMenu" class="selection-menu" hidden>
          <button class="selection-action" type="button" data-selection-action="chat">
            <span class="sm-icon">✉</span>
            Chat
          </button>
          <button class="selection-action" type="button" data-selection-action="summary">
            <span class="sm-icon">⌗</span>
            Summary
          </button>
        </div>

        <div id="highlightMenu" class="highlight-menu" hidden>
          <div class="highlight-menu-title">Highlight</div>
          <div class="highlight-menu-actions">
            <button class="hm-btn" type="button" data-hm-action="delete">Delete</button>
            <button class="hm-btn" type="button" data-hm-action="change-color">Change color</button>
          </div>
        </div>

        <div id="colorPickerMenu" class="color-picker-menu" hidden></div>
      </div>
    </section>

    <section class="panel right" data-view="welcome">
      <div class="panel-top right-top">
        <button class="settings-toggle icon-only" type="button" data-settings="toggle" aria-label="Chat settings">
          <span class="settings-icon" aria-hidden="true">⚙</span>
        </button>
      </div>

      <div class="panel-body chat-view">
        <div id="chatContextBubble" class="chat-context-bubble" hidden></div>
        <div id="chatThread" class="chat-thread" aria-live="polite"></div>
        <div id="chatEmpty" class="chat-empty">Start a chat about the three pages.</div>
      </div>

      <div class="panel-body welcome-view">
        <div class="welcome">
          <div class="welcome-title">WELCOME!</div>
          <div class="welcome-sub">I am Sabi, Your study buddy</div>
          <button class="ask-pill" data-switch="chat">
            <img src="Photos/sabiOwl.png" alt="" />
            Ask me anything!
          </button>
          <div class="quick-actions">
            <button class="action-card" data-switch="chat">
              <span class="card-icon">⌗</span>
              Summary
            </button>
            <button class="action-card" data-switch="chat">
              <span class="card-icon">✳</span>
              Mind Map
            </button>
            <button class="action-card" data-switch="chat">
              <span class="card-icon">✉</span>
              Chat
            </button>
          </div>
        </div>
      </div>

      <div id="mindMapModal" class="mindmap-modal" aria-hidden="true">
        <div class="mindmap-modal-inner" role="dialog" aria-label="Mind map">
          <button class="mindmap-close" type="button" aria-label="Close mind map" data-mindmap-close="true">
            X
          </button>
          <div class="mindmap-image-wrap">
            <img class="mindmap-image" src="Photos/mindMap.png" alt="Mind map" />
          </div>
          <a class="mindmap-download" href="Photos/mindMap.png" download>
            Download mind map
          </a>
        </div>
      </div>

      <div class="chat-bar">
        <div class="owl-mini" aria-hidden="true">
          <img src="Photos/sabiOwl.png" alt="" />
        </div>
        <input type="text" placeholder="Ask about the three pages..." aria-label="Chat input" />
        <button class="send" type="button" aria-label="Send message">Send</button>
        <button class="plus" aria-label="Open menu">
          <span>+</span>
        </button>
      </div>

      <div class="floating-menu" aria-hidden="true">
        <button class="menu-item" data-menu-action="summary">
          <span class="mi-icon">⟲</span>
          <span>Summary</span>
        </button>
        <button class="menu-item" data-menu-action="mindmap">
          <span class="mi-icon">✳</span>
          <span>Mind Map</span>
        </button>
        <button class="menu-item" data-menu-action="chat">
          <span class="mi-icon">✉</span>
          <span>Chat</span>
        </button>
      </div>

      <div class="settings-panel" aria-hidden="true">
        <div class="settings-tabs">
          <button class="settings-tab active" data-settings-tab="style">Style/Font style</button>
          <button class="settings-tab" data-settings-tab="responses">Responses</button>
        </div>
        <div class="settings-body" data-settings-body="style">
          <div class="setting-row">
            <label for="chatFontType">Font type</label>
            <select id="chatFontType" class="setting-select">
              <option>OpenDyslexic</option>
              <option>Dyslexie</option>
              <option>Lexend</option>
              <option>Arial</option>
              <option>Verdana</option>
              <option>Comic Sans</option>
              <option>Calibri</option>
              <option>Helvetica</option>
              <option>Tahoma</option>
              <option>Century Gothic</option>
            </select>
          </div>
          <div class="setting-row">
            <label for="chatFontSize">Font size</label>
            <select id="chatFontSize" class="setting-select">
              <option>10</option>
              <option>11</option>
              <option>12</option>
              <option>13</option>
              <option>14</option>
              <option>15</option>
              <option>16</option>
            </select>
          </div>
          <div class="setting-row">
            <label for="chatHighlights">Highlights ON</label>
            <input id="chatHighlights" class="setting-checkbox" type="checkbox" checked />
          </div>
        </div>
        <div class="settings-body" data-settings-body="responses">
          <div class="setting-row">
            <label for="chatParagraphs">Paragraphs</label>
            <select id="chatParagraphs" class="setting-select">
              <option>1-2 lines</option>
              <option>2-4 lines</option>
              <option>5-6 lines</option>
            </select>
          </div>
          <div class="setting-row">
            <label for="chatFormat">Format text</label>
            <select id="chatFormat" class="setting-select">
              <option>Simple wording</option>
              <option>Professional wording</option>
            </select>
          </div>
          <div class="setting-row">
            <label for="chatPoints">Points</label>
            <select id="chatPoints" class="setting-select">
              <option>Bullet points</option>
              <option>Numbered points</option>
            </select>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="pageDrawerOverlay" class="page-drawer-overlay" hidden></div>
  <aside id="pageDrawer" class="page-drawer" aria-hidden="true">
    <div class="page-drawer-title">Select reformatted page</div>
    <button type="button" class="page-drawer-item" data-page-drawer="pageBook1">
      <span class="page-drawer-check" aria-hidden="true">✓</span>
      <span class="page-drawer-label">Page 1</span>
    </button>
    <button type="button" class="page-drawer-item" data-page-drawer="pageBook2">
      <span class="page-drawer-check" aria-hidden="true">✓</span>
      <span class="page-drawer-label">Page 2</span>
    </button>
    <button type="button" class="page-drawer-item" data-page-drawer="pageBook3">
      <span class="page-drawer-check" aria-hidden="true">✓</span>
      <span class="page-drawer-label">Page 3</span>
    </button>
  </aside>

  <script type="module" src="js/main.js"></script>
</body>
</html>
